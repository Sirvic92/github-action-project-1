name: Workflow 1
on:
  push:
    branches:
      - main
jobs:
  lint:
    name: run-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: install dependencies
        run: npm install
      - name: run lint
        run: npm run lint
  test:
    name: run-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: install dependencies
        run: npm install
      - name: run tests
        run: npm test

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: install dependencies
        run: npm install
      - name: deploy to production
        run: echo "Deploying to production...":